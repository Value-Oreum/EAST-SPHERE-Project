<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="다시 빛나는 동(EAST)-구(SPHERE) — 대구 동구 디지털 랜드마크 프로젝트">
  <meta property="og:title" content="동구(EAST SPHERE) | 대구 동구 디지털 랜드마크 프로젝트">
  <meta property="og:image" content="assets/images/Main.png">
  <meta name="theme-color" content="#040d1a">
  <title>동구(EAST SPHERE) | 다시 빛나는 동구</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #040d1a;
      --gold: #c8a45a;
      --gold-bright: #e8c87a;
      --white: #ffffff;
      --font: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── 캔버스 별 배경 ── */
    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── 구체 후광 ── */
    .sphere-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(600px, 90vw);
      height: min(600px, 90vw);
      border-radius: 50%;
      background: radial-gradient(
        circle at center,
        rgba(200,164,90,.12) 0%,
        rgba(42,80,140,.08) 40%,
        transparent 70%
      );
      z-index: 1;
      animation: spherePulse 4s ease-in-out infinite;
      opacity: 0;
      animation-delay: 1s;
      animation-fill-mode: forwards;
    }
    @keyframes spherePulse {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(.85); }
      30%  { opacity: 1; }
      70%  { opacity: .8; }
      100% { opacity: .4; transform: translate(-50%,-50%) scale(1.05); }
    }

    /* ── 외곽 링 ── */
    .sphere-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(480px, 80vw);
      height: min(480px, 80vw);
      border-radius: 50%;
      border: 1px solid rgba(200,164,90,.15);
      transform: translate(-50%,-50%) scale(.7);
      z-index: 1;
      opacity: 0;
      animation: ringReveal 1.8s cubic-bezier(.4,0,.2,1) 1.2s forwards;
    }
    .sphere-ring:nth-child(2) {
      width: min(560px, 94vw);
      height: min(560px, 94vw);
      border-color: rgba(200,164,90,.08);
      animation-delay: 1.5s;
    }
    @keyframes ringReveal {
      to { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }

    /* ── 중앙 콘텐츠 ── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* 위 레이블 */
    .label-top {
      font-size: clamp(10px, 1.4vw, 13px);
      font-weight: 500;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: rgba(200,164,90,.7);
      opacity: 0;
      transform: translateY(-16px);
      animation: fadeUp .9s ease .4s forwards;
      margin-bottom: clamp(28px, 5vh, 52px);
    }

    /* "다시 빛나는" */
    .line-sub {
      font-size: clamp(18px, 3.5vw, 32px);
      font-weight: 300;
      color: rgba(255,255,255,.65);
      letter-spacing: .12em;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease 1s forwards;
      margin-bottom: clamp(14px, 2.5vh, 28px);
    }

    /* 메인 타이틀 */
    .line-main {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: clamp(6px, 1.5vw, 20px);
      flex-wrap: wrap;
      line-height: 1;
      margin-bottom: clamp(24px, 4vh, 44px);
    }

    .word-east {
      font-size: clamp(52px, 11vw, 110px);
      font-weight: 900;
      color: var(--white);
      letter-spacing: -.02em;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s cubic-bezier(.2,.8,.4,1) 1.7s forwards;
      text-shadow: 0 0 60px rgba(200,164,90,.25);
    }

    .divider-dash {
      font-size: clamp(36px, 7vw, 76px);
      font-weight: 200;
      color: var(--gold);
      opacity: 0;
      animation: fadeIn .7s ease 2.3s forwards;
    }

    .word-sphere {
      font-size: clamp(52px, 11vw, 110px);
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -.02em;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s cubic-bezier(.2,.8,.4,1) 2.4s forwards;
      text-shadow: 0 0 80px rgba(200,164,90,.45), 0 0 160px rgba(200,164,90,.2);
    }

    /* 하단 설명 */
    .line-desc {
      font-size: clamp(12px, 1.6vw, 15px);
      font-weight: 400;
      color: rgba(255,255,255,.45);
      letter-spacing: .1em;
      opacity: 0;
      animation: fadeIn .8s ease 3.3s forwards;
      margin-bottom: clamp(36px, 6vh, 64px);
    }

    /* CTA */
    .cta-wrap {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeIn .9s ease 3.8s forwards;
    }

    .btn-enter {
      position: relative;
      padding: 15px 44px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .1em;
      color: var(--navy);
      background: var(--gold);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background .3s, transform .2s, box-shadow .3s;
      min-height: 48px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-enter:hover {
      background: var(--gold-bright);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,164,90,.5);
    }

    .btn-skip {
      padding: 15px 32px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .06em;
      color: rgba(255,255,255,.45);
      background: transparent;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 3px;
      cursor: pointer;
      transition: border-color .3s, color .3s;
      min-height: 48px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-skip:hover {
      border-color: rgba(255,255,255,.35);
      color: rgba(255,255,255,.7);
    }

    /* 하단 저작권 */
    .footer-credit {
      position: fixed;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: .1em;
      color: rgba(255,255,255,.18);
      z-index: 10;
      opacity: 0;
      animation: fadeIn .8s ease 4.4s forwards;
    }

    /* 스캔라인 효과 */
    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.04) 3px,
        rgba(0,0,0,.04) 4px
      );
      pointer-events: none;
    }

    /* 애니메이션 키프레임 */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="starCanvas" aria-hidden="true"></canvas>
  <div class="sphere-glow" aria-hidden="true"></div>
  <div class="sphere-ring" aria-hidden="true"></div>
  <div class="sphere-ring" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <main class="stage">
    <p class="label-top">DAEGU DONG-GU · DIGITAL LANDMARK PROJECT</p>

    <p class="line-sub">다시 빛나는</p>

    <div class="line-main" role="heading" aria-level="1">
      <span class="word-east">동(EAST)</span>
      <span class="divider-dash">—</span>
      <span class="word-sphere">구(SPHERE)</span>
    </div>

    <p class="line-desc">금호강 관광벨트 · 동촌유원지 수변광장 · 직경 약 5m 구형 디지털 랜드마크</p>

    <div class="cta-wrap">
      <a href="main.html" class="btn-enter">제안서 보기 →</a>
      <a href="main.html#contact" class="btn-skip">문의하기</a>
    </div>
  </main>

  <p class="footer-credit">OREUM Inc. &amp; DK Global &nbsp;·&nbsp; Copyright © 2026 All Rights Reserved</p>

  <script>
    /* ── 별 파티클 캔버스 ── */
    (function () {
      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, stars = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function initStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.2 + 0.2,
            a: Math.random(),
            speed: Math.random() * 0.004 + 0.001,
            phase: Math.random() * Math.PI * 2
          });
        }
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, W, H);
        frame++;
        stars.forEach(function (s) {
          const alpha = (Math.sin(frame * s.speed + s.phase) + 1) / 2;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(200,180,120,' + (alpha * 0.7 + 0.1) + ')';
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }

      resize();
      initStars(220);
      draw();
      window.addEventListener('resize', function () {
        resize();
        initStars(220);
      });
    })();
  </script>
</body>
</html>
